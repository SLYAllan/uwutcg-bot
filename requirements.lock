# Lockfile : closure COMPLÈTE et pinnée des dépendances (deps directes + transitives).
# C'est ce fichier qu'installe le Docker (Coolify) → chaque rebuild est identique
# au bit près. requirements.txt reste la source lisible des deps DIRECTES.
#
# Régénérer après toute modif de requirements.txt :
#   python -m venv .venv && .venv/Scripts/pip install -r requirements.txt
#   .venv/Scripts/pip freeze > requirements.lock
# puis relancer la suite de tests avant de committer.
#
# Pourquoi : une dep non pinnée (playwright-stealth) a sauté en 2.x au rebuild et
# cassé monitor + notif FromJapan en silence (cf. commit du 2026-06-20).

